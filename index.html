<body class="bg-dark text-white font-inter">
    <!-- 登录页面 -->
    <div id="login-page" class="hidden">
        <!-- 登录页面内容将通过JavaScript动态加载 -->
    </div>

    <!-- 主应用 -->
    <div id="app" class="hidden">
        <!-- 页面头部 -->
        <header id="header"></header>
        <!-- 主内容区域 -->
        <main id="main-content" class="flex-1 px-4 py-8">
            <!-- 主内容将通过JavaScript动态加载 -->
        </main>
    </div>

    <!-- 模态框容器 -->
    <div id="modals">
        <!-- 各种模态框将在这里动态创建 -->
    </div>

    <!-- 模块化UI测试区域 -->
    <div id="ui-test-area" class="fixed bottom-4 right-4 z-50" style="display: none;">
        <div class="bg-white rounded-lg shadow-lg p-4 max-w-sm">
            <h3 class="text-lg font-semibold text-gray-800 mb-3">模块化UI测试</h3>
            <div class="space-y-2">
                <button onclick="testSettingsManager()" class="w-full bg-blue-500 hover:bg-blue-600 text-white px-3 py-2 rounded text-sm">
                    设置管理
                </button>
                <button onclick="testUrlManager()" class="w-full bg-green-500 hover:bg-green-600 text-white px-3 py-2 rounded text-sm">
                    URL管理
                </button>
                <button onclick="testModalManager()" class="w-full bg-purple-500 hover:bg-purple-600 text-white px-3 py-2 rounded text-sm">
                    模态框管理
                </button>
                <button onclick="testUtils()" class="w-full bg-orange-500 hover:bg-orange-600 text-white px-3 py-2 rounded text-sm">
                    工具函数
                </button>
                <button onclick="toggleTestArea()" class="w-full bg-gray-500 hover:bg-gray-600 text-white px-3 py-2 rounded text-sm">
                    隐藏测试
                </button>
            </div>
        </div>
    </div>

    <!-- 测试按钮 -->
    <button id="show-test-btn" onclick="toggleTestArea()" class="fixed bottom-4 right-4 bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-full shadow-lg z-40">
        🧪 测试UI
    </button>

    <!-- 加载配置文件 -->
    <script src="/static/js/env.js"></script>

    <script src="/static/js/api/documents.js?v=20250718"></script>

    <!-- 模块化UI系统 -->
    <script src="/static/js/ui/core.js"></script>

    <!-- 应用主文件 -->
    <script src="/static/js/app.js?v=20250718"></script>

    <script src="/static/js/mobile-enhancement.js?v=20250718"></script>



    <script>
        // 动态加载HTML模板
        async function loadTemplate(templateName) {
            try {
                const response = await fetch(`/static/html/${templateName}.html`);
                return await response.text();
            } catch (error) {
                return '';
            }
        }

        // 立即初始化粒子效果
        function initParticlesImmediately() {
            // 检查particlesJS库是否已加载
            if (typeof particlesJS !== 'undefined') {
                const particlesContainer = document.getElementById('particles-js');
                if (particlesContainer && particlesContainer.children.length === 0) {

                    try {
                        particlesContainer.style.position = 'fixed';
                        particlesContainer.style.top = '0';
                        particlesContainer.style.left = '0';
                        particlesContainer.style.width = '100%';
                        particlesContainer.style.height = '100%';
                        particlesContainer.style.zIndex = '0';
                        particlesContainer.style.pointerEvents = 'none';
                        
                        particlesJS('particles-js', {
                            particles: {
                                number: { value: 80, density: { enable: true, value_area: 800 } },
                                color: { value: '#ffffff' },
                                shape: { type: 'circle', stroke: { width: 0, color: '#000000' } },
                                opacity: { value: 0.5, random: false, anim: { enable: false, speed: 1, opacity_min: 0.1, sync: false } },
                                size: { value: 3, random: true, anim: { enable: false, speed: 40, size_min: 0.1, sync: false } },
                                line_linked: { enable: true, distance: 150, color: '#ffffff', opacity: 0.4, width: 1 },
                                move: { enable: true, speed: 6, direction: 'none', random: false, straight: false, out_mode: 'out', bounce: false, attract: { enable: false, rotateX: 600, rotateY: 1200 } }
                            },
                            interactivity: {
                                detect_on: 'canvas',
                                events: {
                                    onhover: { enable: true, mode: 'repulse' },
                                    onclick: { enable: true, mode: 'push' },
                                    resize: true
                                },
                                modes: {
                                    grab: { distance: 400, line_linked: { opacity: 1 } },
                                    bubble: { distance: 400, size: 40, duration: 2, opacity: 8, speed: 3 },
                                    repulse: { distance: 200, duration: 0.4 },
                                    push: { particles_nb: 4 },
                                    remove: { particles_nb: 2 }
                                }
                            },
                            retina_detect: true
                        });

                    } catch (error) {

                    }
                }
            }
        }

        // 初始化页面模板
        async function initializeTemplates() {
            try {
                // 加载登录页面
                const loginTemplate = await loadTemplate('login');
                document.getElementById('login-page').innerHTML = loginTemplate;

                // 加载头部
                const headerTemplate = await loadTemplate('header');
                document.getElementById('header').innerHTML = headerTemplate;

                // 加载主内容
                const mainContentTemplate = await loadTemplate('main-content');
                document.getElementById('main-content').innerHTML = mainContentTemplate;

                // 显示登录页，隐藏主应用
                document.getElementById('login-page').classList.remove('hidden');
                document.getElementById('app').classList.add('hidden');

                // 立即尝试初始化粒子效果
                initParticlesImmediately();

                // 模板加载完成后初始化应用

                window.app = new App();
                
                // 应用初始化完成后，确保AuthManager存在
                if (!window.authManager) {
                    window.authManager = new AuthManager();
                }
            } catch (error) {
                // 静默处理错误
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', async function() {
            await initializeTemplates();
        });

        // 在window load事件中也尝试初始化粒子效果
        window.addEventListener('load', function() {
            setTimeout(initParticlesImmediately, 100);
        });

        // 模块化UI测试函数
        function toggleTestArea() {
            const testArea = document.getElementById('ui-test-area');
            const showBtn = document.getElementById('show-test-btn');
            
            if (testArea.style.display === 'none') {
                testArea.style.display = 'block';
                showBtn.style.display = 'none';
            } else {
                testArea.style.display = 'none';
                showBtn.style.display = 'block';
            }
        }

        function testSettingsManager() {
            if (window.uiManager && window.uiManager.settingsManager) {
                window.uiManager.settingsManager.showSettingsPanel();
                console.log('设置管理模块已启动');
            } else {
                alert('设置管理模块未加载');
            }
        }

        function testUrlManager() {
            if (window.uiManager && window.uiManager.urlManager) {
                window.uiManager.urlManager.showUrlPanel();
                console.log('URL管理模块已启动');
            } else {
                alert('URL管理模块未加载');
            }
        }

        function testModalManager() {
            if (window.uiManager && window.uiManager.modalManager) {
                window.uiManager.modalManager.showMessage('这是模块化UI系统的模态框测试', 'info');
                console.log('模态框管理模块已启动');
            } else {
                alert('模态框管理模块未加载');
            }
        }

        function testUtils() {
            if (window.uiManager && window.uiManager.utils) {
                const randomString = window.uiManager.utils.randomString(10);
                const formattedDate = window.uiManager.utils.formatDate(new Date());
                alert(`工具函数测试:\n随机字符串: ${randomString}\n格式化日期: ${formattedDate}`);
                console.log('工具函数模块已启动');
            } else {
                alert('工具函数模块未加载');
            }
        }

        // 页面加载完成后初始化UI管理器
        window.addEventListener('load', function() {
            setTimeout(() => {
                if (window.UIManager && !window.uiManager) {
                    window.uiManager = new UIManager();
                    console.log('模块化UI管理器已初始化');
                }
            }, 1000);
        });
    </script>
</body>
