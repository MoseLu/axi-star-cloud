<!-- 欢迎信息 -->
<div class="mb-8">
    <div class="glass-effect rounded-2xl p-8 border border-purple-light/20 shadow-xl relative overflow-hidden">
        <!-- 背景装饰 -->
        <div class="absolute inset-0 bg-gradient-to-br from-purple-500/5 via-blue-500/5 to-cyan-500/5"></div>
        <div class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-br from-purple-500/10 to-transparent rounded-full -translate-y-16 translate-x-16"></div>
        <div class="absolute bottom-0 left-0 w-24 h-24 bg-gradient-to-br from-cyan-500/10 to-transparent rounded-full translate-y-12 -translate-x-12"></div>
        
        <div class="relative z-10">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center space-x-4">
                    <div class="relative group">
                        <div class="w-16 h-16 bg-gradient-to-br from-purple-light to-blue-light rounded-2xl flex items-center justify-center shadow-lg cursor-pointer hover:scale-105 transition-transform duration-300" id="profile-avatar" title="点击编辑个人资料">
                            <i class="fa fa-user-circle text-2xl text-white" id="avatar-icon"></i>
                            <img id="avatar-image" class="w-full h-full rounded-2xl object-cover hidden" alt="头像">
                        </div>
                        <!-- 悬停时显示的编辑提示 -->
                        <div class="absolute inset-0 bg-black/40 rounded-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center pointer-events-none">
                            <div class="text-center">
                                <i class="fa fa-user-edit text-white text-lg mb-1"></i>
                                <p class="text-white text-xs font-medium">编辑资料</p>
                            </div>
                        </div>
                        <!-- 编辑图标提示 -->
                        <div class="absolute -top-1 -right-1 w-6 h-6 bg-gradient-to-r from-purple-500/80 to-blue-500/80 hover:from-purple-500 hover:to-blue-500 rounded-full flex items-center justify-center cursor-pointer hover:scale-110 transition-all duration-300 shadow-lg pointer-events-none" title="编辑个人资料">
                            <i class="fa fa-pencil text-white text-xs"></i>
                        </div>
                    </div>
                    <div>
                        <h1 class="text-[clamp(1.8rem,4vw,2.5rem)] font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-light via-blue-light to-cyan-400 mb-1">
                            <span id="welcome-message">欢迎回来，用户</span>
                        </h1>
                        <p class="text-gray-300 text-lg">今天是 <span id="current-date" class="text-purple-light font-medium"></span></p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="flex-shrink-0">
                        <div class="bg-gradient-to-r from-emerald-500/20 to-cyan-500/20 rounded-xl p-6 border border-emerald-400/30 min-w-[140px] max-w-[160px] hover:border-emerald-400/50 transition-all duration-300 text-center">
                            <div class="text-5xl font-bold text-emerald-400 mb-3 leading-none tracking-tight" id="file-count">0</div>
                            <div class="text-sm text-emerald-300 font-medium">个文件</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-gradient-to-r from-purple-500/10 to-purple-600/10 rounded-xl p-4 border border-purple-400/20">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-purple-500/20 rounded-lg flex items-center justify-center">
                            <i class="fa fa-clock-o text-purple-400"></i>
                        </div>
                        <div>
                            <div class="text-sm text-gray-400">最后登录</div>
                            <div class="text-purple-300 font-medium" id="last-login">刚刚</div>
                        </div>
                    </div>
                </div>
                
                <div class="bg-gradient-to-r from-blue-500/10 to-blue-600/10 rounded-xl p-4 border border-blue-400/20">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-blue-500/20 rounded-lg flex items-center justify-center">
                            <i class="fa fa-cloud text-blue-400"></i>
                        </div>
                        <div>
                            <div class="text-sm text-gray-400">存储状态</div>
                            <div class="text-blue-300 font-medium">正常</div>
                        </div>
                    </div>
                </div>
                
                <div class="bg-gradient-to-r from-cyan-500/10 to-cyan-600/10 rounded-xl p-4 border border-cyan-400/20">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-cyan-500/20 rounded-lg flex items-center justify-center">
                            <i class="fa fa-shield text-cyan-400"></i>
                        </div>
                        <div>
                            <div class="text-sm text-gray-400">安全状态</div>
                            <div class="text-cyan-300 font-medium">已保护</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
