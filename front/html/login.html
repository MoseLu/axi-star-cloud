<!-- 登录页面 -->
<div id="login-page" class="min-h-screen relative z-50">
    <!-- 星空背景 -->
    <div class="fixed inset-0 bg-stars z-0 opacity-30"></div>
    <div class="fixed inset-0 bg-gradient-to-br from-blue-deep via-dark to-purple-deep z-[-1]"></div>
    
    <!-- 粒子效果容器 -->
    <div id="particles-js" class="fixed inset-0 pointer-events-none z-0"></div>
    
    <!-- 登录表单 -->
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="glass-effect p-8 rounded-2xl w-full max-w-md mx-4 border border-purple-light/30 shadow-xl">
            <div class="text-center mb-8">
                <div class="mb-4">
                    <img src="/static/public/favicon.png" alt="星际云盘" class="w-16 h-16 mx-auto rounded-lg shadow-lg">
                </div>
                <h1 class="text-[clamp(1.8rem,5vw,2.5rem)] font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-light to-purple-light mb-2">星际云盘</h1>
                <p class="text-gray-400">安全、高效的云端存储解决方案</p>
            </div>
            
            <form id="login-form" class="space-y-6">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-300 mb-1">用户名</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fa fa-user"></i>
                        </span>
                        <input type="text" id="username" name="username" 
                               class="bg-dark-light border border-purple-light/30 text-gray-100 rounded-lg block w-full pl-10 p-3 focus:ring-2 focus:ring-purple-light/50 focus:border-purple-light transition-all duration-300"
                               placeholder="请输入用户名" required>
                    </div>
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-1">密码</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fa fa-lock"></i>
                        </span>
                        <input type="password" id="password" name="password" 
                               class="bg-dark-light border border-purple-light/30 text-gray-100 rounded-lg block w-full pl-10 p-3 focus:ring-2 focus:ring-purple-light/50 focus:border-purple-light transition-all duration-300 pr-10"
                               placeholder="请输入密码" required>
                        <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 focus:outline-none" tabindex="-1">
                            <i class="fa fa-eye" id="toggle-password-icon"></i>
                        </button>
                    </div>
                </div>
                
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" 
                               class="h-4 w-4 rounded border-gray-600 text-purple-light focus:ring-purple-light/50">
                        <label for="remember-me" class="ml-2 block text-sm text-gray-400">记住我</label>
                    </div>
                    <a href="#" class="text-sm text-purple-light hover:text-purple-light/80 transition-colors">忘记密码?</a>
                </div>
                
                <button id="login-btn" type="submit" 
                        class="w-full bg-gradient-to-r from-primary to-secondary hover:from-primary/90 hover:to-secondary/90 text-white font-medium py-3 px-4 rounded-lg shadow-lg shadow-primary/20 btn-glow transition-all duration-300 transform hover:scale-[1.02]">
                    登录
                </button>
            </form>
            

        </div>
    </div>
</div>
