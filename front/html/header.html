<!-- 页面头部 -->
<header class="glass-effect border-b border-purple-light/20 sticky top-0 z-40">
    <div class="container mx-auto px-4 py-3 flex items-center justify-between">
        <div class="flex items-center space-x-4">
            <div class="flex items-center space-x-3">
                <img src="/static/public/favicon.png" alt="星际云盘" class="w-8 h-8 rounded-lg shadow-md">
                <div class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-light to-purple-light">
                    星际云盘
                </div>
            </div>
        </div>
        
        <div class="flex-1 max-w-xl mx-8">
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                    <i class="fa fa-search"></i>
                </span>
                <input type="text" id="search-input" 
                       class="bg-dark-light border border-purple-light/30 text-gray-100 rounded-lg block w-full pl-10 pr-4 py-2 focus:ring-2 focus:ring-purple-light/50 focus:border-purple-light transition-all duration-300"
                       placeholder="搜索文件...">
            </div>
        </div>
        
        <div class="flex items-center space-x-6">
            <button id="upload-btn" class="flex items-center space-x-2 bg-gradient-to-r from-primary/80 to-secondary/80 hover:from-primary to-secondary text-white px-4 py-2 rounded-lg shadow-md shadow-primary/20 transition-all duration-300 transform hover:scale-[1.03]">
                <i class="fa fa-upload"></i>
                <span>上传文件</span>
            </button>
            
            <div class="relative group">
                <button class="flex items-center space-x-2">
                    <img id="user-avatar" src="https://picsum.photos/200/200?random=1" alt="用户头像" class="w-8 h-8 rounded-full border-2 border-purple-light/50 object-cover">
                    <span id="user-name" class="text-sm font-medium text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-amber-500 to-orange-500">用户名</span>
                    <i class="fa fa-chevron-down text-xs text-gray-400"></i>
                </button>
                
                <div class="absolute right-0 mt-2 w-48 glass-effect rounded-lg shadow-xl border border-purple-light/20 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50">
                    <div class="py-2">
                        <a href="#" class="block px-4 py-2 text-sm text-gray-300 hover:bg-purple-light/20 hover:text-white transition-colors">
                            <i class="fa fa-user-circle mr-2"></i>个人资料
                        </a>
                        <a href="#" id="settings-btn" class="block px-4 py-2 text-sm text-gray-300 hover:bg-purple-light/20 hover:text-white transition-colors">
                            <i class="fa fa-cog mr-2"></i>设置
                        </a>
                        <div class="border-t border-gray-700 my-1"></div>
                        <a href="#" id="logout-btn" class="block px-4 py-2 text-sm text-red-400 hover:bg-red-900/20 hover:text-red-300 transition-colors">
                            <i class="fa fa-sign-out mr-2"></i>退出登录
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
