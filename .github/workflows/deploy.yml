name: CI/CD 后端部署

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout 代码
        uses: actions/checkout@v4

      # 2. 设置 Go
      - name: Setup Go 1.23.4
        uses: actions/setup-go@v4
        with:
          go-version: '1.23.4'

      # 3. 编译并打包二进制
      - name: 编译并打包
        run: |
          cd backend
          go mod tidy
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o star-cloud-linux main.go
          tar czf ../star-cloud-linux.tar.gz star-cloud-linux

      # 4. 启动 ssh-agent 并加载密钥
      - name: 启动 ssh-agent
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.SERVER_KEY }}

      # 5. 创建远程目录
      - name: 在服务器上创建目录
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "mkdir -p /www/wwwroot/axi-star-cloud/logs /www/wwwroot/axi-star-cloud/uploads /www/wwwroot/axi-star-cloud/config /www/wwwroot/axi-star-cloud/front"

      # 6. 打包所有文件
      - name: 打包所有文件
        run: |
          tar czf deployment.tar.gz star-cloud-linux.tar.gz front/ index.html backend/config/ star-cloud.service

      # 7. 上传打包文件
      - name: 上传文件
        run: |
          scp -o StrictHostKeyChecking=no deployment.tar.gz \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/

      # 8. 部署并重启后端
      - name: 部署并重启后端
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e

            echo "开始快速部署..."

            # 1. 停止服务
            sudo systemctl stop star-cloud.service || true
            sudo pkill -f star-cloud-linux || true

            # 2. 解包部署文件
            echo "解包部署文件..."
            tar xzf /tmp/deployment.tar.gz -C /tmp/
            
            # 3. 解包并替换二进制
            tar xzf /tmp/star-cloud-linux.tar.gz -C /www/wwwroot/axi-star-cloud/
            chmod +x /www/wwwroot/axi-star-cloud/star-cloud-linux

            # 4. 复制前端文件
            cp -r /tmp/front/* /www/wwwroot/axi-star-cloud/front/
            cp /tmp/index.html /www/wwwroot/axi-star-cloud/
            cp -r /tmp/backend/config/* /www/wwwroot/axi-star-cloud/config/

            # 5. 创建 systemd 服务单元
            sudo cp /tmp/star-cloud.service /etc/systemd/system/
            sudo chmod 644 /etc/systemd/system/star-cloud.service

            # 6. 确保uploads目录存在
            mkdir -p /www/wwwroot/axi-star-cloud/uploads/{image,document,audio,video,other,avatars}

            # 7. 重启服务
            sudo systemctl daemon-reload
            sudo systemctl enable star-cloud.service
            sudo systemctl restart star-cloud.service

            # 8. 快速健康检查
            sleep 5
            if curl -f -s http://127.0.0.1:8080/health > /dev/null 2>&1; then
                echo "✅ 部署成功！"
            else
                echo "❌ 部署失败"
                sudo systemctl status star-cloud.service --no-pager --lines 5
                exit 1
            fi

            # 9. 清理临时文件
            rm -f /tmp/deployment.tar.gz /tmp/star-cloud-linux.tar.gz
            rm -rf /tmp/front /tmp/backend

            echo "部署完成！"
          EOF 