name: 自动部署到云端

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置Go环境
      uses: actions/setup-go@v4
      with:
        go-version: '1.23.4'
        
    - name: 构建Go程序
      run: |
        cd backend
        go mod download
        go build -o main main.go
        
    - name: 部署到服务器
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: ${{ secrets.PORT }}
        script: |
          # 进入项目目录
          cd /www/wwwroot/axi-star-cloud
          
          # 备份当前版本
          echo "📦 备份当前版本..."
          if [ -f backend/main ]; then
            cp backend/main backend/main.backup.$(date +%Y%m%d_%H%M%S)
          fi
          
          # 尝试拉取最新代码（如果网络可用）
          echo "🔄 尝试拉取最新代码..."
          if git pull origin main 2>/dev/null; then
            echo "✅ 代码更新成功"
          else
            echo "⚠️  网络连接失败，使用离线部署模式"
            # 运行离线部署脚本
            if [ -f "offline-deploy.sh" ]; then
              chmod +x offline-deploy.sh
              ./offline-deploy.sh
              exit 0
            fi
          fi
          
          # 运行权限修复脚本
          echo "🔧 修复权限..."
          chmod +x fix-permissions.sh
          ./fix-permissions.sh
          
          # 重新编译程序
          echo "🔨 重新编译程序..."
          cd backend
          export GOPROXY=https://goproxy.cn,direct
          go mod download
          go build -o main main.go
          chmod +x main
          
          # 停止当前服务
          echo "⏹️  停止当前服务..."
          pkill -f "backend/main" || true
          sleep 2
          
          # 启动新服务
          echo "▶️  启动新服务..."
          cd /www/wwwroot/axi-star-cloud/backend
          nohup ./main > ../logs/app.log 2>&1 &
          echo $! > ../pid.txt
          
          # 等待服务启动
          echo "⏳ 等待服务启动..."
          sleep 5
          
          # 检查服务状态
          echo "🔍 检查服务状态..."
          if curl -f http://localhost:8080/health > /dev/null 2>&1; then
            echo "✅ 部署成功！服务已启动"
          else
            echo "❌ 部署失败，回滚到备份版本"
            if [ -f backend/main.backup.* ]; then
              latest_backup=$(ls -t backend/main.backup.* | head -1)
              mv "$latest_backup" backend/main
              cd backend
              nohup ./main > ../logs/app.log 2>&1 &
              echo $! > ../pid.txt
            fi
          fi
          
          echo "🎉 部署完成！" 