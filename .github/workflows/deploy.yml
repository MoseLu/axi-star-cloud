name: 自动部署到云端

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置Go环境
      uses: actions/setup-go@v4
      with:
        go-version: '1.23.4'
        cache: false
        
    - name: 编译并打包
      run: |
        cd backend
        go mod tidy
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o star-cloud-linux main.go
        tar czf ../star-cloud-linux.tar.gz star-cloud-linux
        
    - name: 启动ssh-agent
      uses: webfactory/ssh-agent@v0.5.4
      with:
        ssh-private-key: ${{ secrets.SERVER_KEY }}
        
    - name: 创建远程目录
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
          "mkdir -p /www/wwwroot/axi-star-cloud/logs /www/wwwroot/axi-star-cloud/uploads /www/wwwroot/axi-star-cloud/config /www/wwwroot/axi-star-cloud/front"
          
    - name: 上传文件
      run: |
        scp -o StrictHostKeyChecking=no star-cloud-linux.tar.gz \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/www/wwwroot/axi-star-cloud/
        scp -o StrictHostKeyChecking=no backend/config/config.yaml \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/www/wwwroot/axi-star-cloud/config/
        scp -r -o StrictHostKeyChecking=no front/* \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/www/wwwroot/axi-star-cloud/front/
        scp -o StrictHostKeyChecking=no index.html \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/www/wwwroot/axi-star-cloud/
            
    - name: 部署并重启服务
      run: |
        # 把私钥写到文件
        mkdir -p ~/.ssh
        echo "${{ secrets.SERVER_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        
        # SSH到服务器执行部署命令
        ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
          set -e
          
          echo "=== 开始部署流程 ==="
          date
          
          # 进入项目目录
          cd /www/wwwroot/axi-star-cloud
          pwd
          ls -la
          
          # 停止所有相关进程
          echo "停止所有相关进程..."
          pkill -f "star-cloud" || echo "没有找到运行中的服务"
          sleep 3
          
          # 解包并替换二进制
          echo "解包并替换二进制..."
          tar xzf star-cloud-linux.tar.gz
          chmod +x star-cloud-linux
          
          # 创建必要的目录
          echo "创建必要的目录..."
          mkdir -p logs uploads
          mkdir -p uploads/{image,document,audio,video,other,avatars}
          
          # 查找可能的服务名称
          echo "查找可能的服务名称..."
          possible_services=("star-cloud" "axi-star-cloud" "star_cloud" "axi_star_cloud")
          found_service=""
          
          for service in "${possible_services[@]}"; do
            if systemctl list-unit-files | grep -q "$service.service"; then
              found_service="$service"
              echo "找到服务: $found_service"
              break
            fi
          done
          
          # 如果找到服务，使用systemctl管理
          if [ -n "$found_service" ]; then
            echo "使用systemctl管理服务: $found_service"
            if systemctl is-active --quiet "$found_service"; then
              echo "服务正在运行，重启服务..."
              systemctl restart "$found_service"
            else
              echo "服务未运行，启动服务..."
              systemctl start "$found_service"
            fi
            
            # 等待服务启动
            echo "等待服务启动..."
            sleep 10
            
            # 检查服务状态
            if systemctl is-active --quiet "$found_service"; then
              echo "✅ 服务已启动"
            else
              echo "❌ 服务启动失败"
              echo "查看服务日志:"
              journalctl -u "$found_service" -n 50 --no-pager
              exit 1
            fi
          else
            echo "未找到systemd服务，直接启动进程..."
            # 直接启动进程
            nohup ./star-cloud-linux > logs/app.log 2>&1 &
            echo $! > pid.txt
            echo "服务PID: $!"
            
            # 等待服务启动
            echo "等待服务启动..."
            sleep 10
            
            # 检查服务状态
            if pgrep -f "star-cloud" > /dev/null; then
              echo "✅ 服务已启动"
            else
              echo "❌ 服务启动失败"
              echo "查看服务日志:"
              tail -50 logs/app.log || echo "日志文件不存在"
              exit 1
            fi
          fi
          
          # 健康检查
          for i in {1..3}; do
            echo "第 $i 次健康检查..."
            if curl -f -s http://localhost:8080/health > /dev/null 2>&1; then
              echo "✅ 部署成功！服务正常运行"
              if [ -n "$found_service" ]; then
                echo "服务状态:"
                systemctl status "$found_service" --no-pager --lines 5
              else
                echo "服务日志:"
                tail -10 logs/app.log
              fi
              exit 0
            else
              echo "健康检查失败，等待重试..."
              sleep 5
            fi
          done
          
          echo "❌ 健康检查失败"
          if [ -n "$found_service" ]; then
            echo "查看服务日志:"
            journalctl -u "$found_service" -n 20 --no-pager
          else
            echo "查看服务日志:"
            tail -20 logs/app.log || echo "日志文件不存在"
          fi
        EOF 