name: CI/CD 后端部署

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout 代码
        uses: actions/checkout@v4

      # 2. 设置 Go
      - name: Setup Go 1.23.4
        uses: actions/setup-go@v4
        with:
          go-version: '1.23.4'

      # 3. 编译并打包二进制
      - name: 编译并打包
        run: |
          cd backend
          go mod tidy
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o star-cloud-linux main.go
          tar czf ../star-cloud-linux.tar.gz star-cloud-linux

      # 4. 启动 ssh-agent 并加载密钥
      - name: 启动 ssh-agent
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.SERVER_KEY }}

      # 5. 创建远程目录
      - name: 在服务器上创建目录
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "mkdir -p /www/wwwroot/axi-star-cloud/logs /www/wwwroot/axi-star-cloud/uploads /www/wwwroot/axi-star-cloud/config /www/wwwroot/axi-star-cloud/front"

      # 6. 上传二进制包和前端文件（排除uploads）
      - name: 上传文件
        run: |
          scp -o StrictHostKeyChecking=no star-cloud-linux.tar.gz \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/www/wwwroot/axi-star-cloud/
          scp -r -o StrictHostKeyChecking=no front/css \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/www/wwwroot/axi-star-cloud/front/
          scp -r -o StrictHostKeyChecking=no front/html \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/www/wwwroot/axi-star-cloud/front/
          scp -r -o StrictHostKeyChecking=no front/js \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/www/wwwroot/axi-star-cloud/front/
          scp -r -o StrictHostKeyChecking=no front/public \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/www/wwwroot/axi-star-cloud/front/
          scp -o StrictHostKeyChecking=no index.html \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/www/wwwroot/axi-star-cloud/
          scp -o StrictHostKeyChecking=no star-cloud.service \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/

      # 7. 部署并重启后端
      - name: 部署并重启后端
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e

            # 0. 彻底清理端口占用
            echo "清理端口8080占用..."
            sudo systemctl stop star-cloud.service || true
            sudo pkill -f star-cloud-linux || true
            sudo pkill -f "8080" || true
            
            # 查找并杀死占用8080端口的进程
            PORT_PID=$(sudo lsof -ti:8080 2>/dev/null || echo "")
            if [ -n "$PORT_PID" ]; then
              echo "发现占用8080端口的进程: $PORT_PID"
              sudo kill -9 $PORT_PID || true
            fi
            
            # 等待端口释放
            sleep 3
            
            # 确认端口已释放
            if sudo lsof -ti:8080 >/dev/null 2>&1; then
              echo "警告: 8080端口仍被占用"
              sudo lsof -i:8080
            else
              echo "✅ 8080端口已释放"
            fi

            # 1. 解包并替换二进制
            echo "解包并替换二进制..."
            tar xzf /www/wwwroot/axi-star-cloud/star-cloud-linux.tar.gz -C /www/wwwroot/axi-star-cloud/
            chmod +x /www/wwwroot/axi-star-cloud/star-cloud-linux

            # 2. 创建 systemd 服务单元
            echo "创建systemd服务单元..."
            sudo cp /tmp/star-cloud.service /etc/systemd/system/
            sudo chmod 644 /etc/systemd/system/star-cloud.service

            # 3. 确保uploads目录存在
            echo "确保uploads目录结构..."
            mkdir -p /www/wwwroot/axi-star-cloud/front/uploads/{image,document,audio,video,other,avatars}

            # 4. 重载并重启 systemd 服务
            echo "重载并重启服务..."
            sudo systemctl daemon-reload
            sudo systemctl enable star-cloud.service
            sudo systemctl restart star-cloud.service

            # 5. 等待服务启动
            echo "等待服务启动..."
            sleep 5

            # 6. 输出状态和日志，确认已重启
            echo "检查服务状态..."
            sudo systemctl status star-cloud.service --no-pager --lines 10
            
            # 7. 健康检查
            echo "执行健康检查..."
            for i in {1..3}; do
              if curl -f -s http://127.0.0.1:8080/health > /dev/null 2>&1; then
                echo "✅ 服务启动成功！"
                break
              else
                echo "第 $i 次健康检查失败，等待重试..."
                sleep 3
              fi
            done

            exit 0
          EOF 