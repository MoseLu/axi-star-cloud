name: 自动部署到云端

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置Go环境
      uses: actions/setup-go@v4
      with:
        go-version: '1.23.4'
        cache: false
        
    - name: 构建Go程序
      run: |
        cd backend
        go mod download
        go mod tidy
        go build -o star-cloud main.go
        
    - name: 部署到服务器
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_KEY }}
        port: 22
        script: |
          echo "=== 开始部署流程 ==="
          date
          
          # 进入项目目录
          cd /www/wwwroot/axi-star-cloud
          pwd
          ls -la
          
          # 停止当前服务
          echo "停止当前服务..."
          pkill -f "star-cloud" || echo "没有找到运行中的服务"
          sleep 3
          
          # 拉取最新代码
          echo "拉取最新代码..."
          git pull origin main
          
          # 设置Go环境
          export PATH=$PATH:/usr/local/btgo/bin
          
          # 重新编译程序
          echo "开始编译程序..."
          cd backend
          /usr/local/btgo/bin/go mod download
          /usr/local/btgo/bin/go mod tidy
          /usr/local/btgo/bin/go build -o ../star-cloud main.go
          cd ..
          
          # 检查编译结果
          if [ -f star-cloud ]; then
            echo "✅ 编译成功"
            ls -la star-cloud
          else
            echo "❌ 编译失败"
            exit 1
          fi
          
          # 设置执行权限
          chmod +x star-cloud
          
          # 创建必要的目录
          mkdir -p logs uploads
          mkdir -p uploads/{image,document,audio,video,other,avatars}
          
          # 启动新服务
          echo "启动新服务..."
          nohup ./star-cloud > logs/app.log 2>&1 &
          echo $! > pid.txt
          echo "服务PID: $!"
          
          # 等待服务启动
          echo "等待服务启动..."
          sleep 10
          
          # 检查服务状态
          echo "检查服务状态..."
          if pgrep -f "star-cloud" > /dev/null; then
            echo "✅ 服务已启动"
            echo "✅ 部署成功！"
          else
            echo "❌ 服务启动失败"
            echo "查看服务日志:"
            tail -50 logs/app.log || echo "日志文件不存在"
            exit 1
          fi 