name: 自动部署到云端

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置Go环境
      uses: actions/setup-go@v4
      with:
        go-version: '1.23.4'
        
    - name: 构建Go程序
      run: |
        cd backend
        go mod download
        go mod tidy
        go build -o star-cloud main.go
        
    - name: 部署到服务器
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_KEY }}
        port: 22
        script: |
          cd /www/wwwroot/axi-star-cloud
          
          echo "=== 开始部署流程 ==="
          
          # 备份当前版本
          if [ -f star-cloud ]; then
            echo "备份当前版本..."
            cp star-cloud star-cloud.backup.$(date +%Y%m%d_%H%M%S)
          fi
          
          # 拉取最新代码（带重试机制）
          echo "拉取最新代码..."
          for i in {1..3}; do
            echo "第 $i 次尝试拉取代码..."
            if git pull origin main; then
              echo "代码拉取成功"
              break
            else
              echo "第 $i 次拉取失败"
              if [ $i -eq 3 ]; then
                echo "❌ 代码拉取失败，使用本地代码继续部署"
              else
                echo "等待5秒后重试..."
                sleep 5
              fi
            fi
          done
          
          # 设置Go环境路径
          echo "设置Go环境路径..."
          export PATH=$PATH:/usr/local/btgo/bin
          
          # 验证Go环境
          echo "验证Go环境..."
          /usr/local/btgo/bin/go version || {
            echo "❌ Go环境验证失败"
            exit 1
          }
          
          # 重新编译程序
          echo "开始编译程序..."
          cd backend
          echo "下载依赖..."
          /usr/local/btgo/bin/go mod download || {
            echo "❌ 依赖下载失败"
            exit 1
          }
          echo "整理依赖..."
          /usr/local/btgo/bin/go mod tidy || {
            echo "❌ 依赖整理失败"
            exit 1
          }
          echo "编译程序..."
          /usr/local/btgo/bin/go build -o ../star-cloud main.go || {
            echo "❌ 编译失败"
            exit 1
          }
          cd ..
          
          # 检查编译结果
          if [ ! -f star-cloud ]; then
            echo "❌ 编译失败，程序文件不存在"
            exit 1
          fi
          
          echo "设置执行权限..."
          chmod +x star-cloud
          
          # 停止当前服务
          echo "停止当前服务..."
          pkill -f "star-cloud" || true
          sleep 3
          
          # 检查是否还有进程在运行
          if pgrep -f "star-cloud" > /dev/null; then
            echo "强制停止服务..."
            pkill -9 -f "star-cloud" || true
            sleep 2
          fi
          
          # 启动新服务
          echo "启动新服务..."
          mkdir -p logs
          
          # 先尝试直接运行看是否有错误
          echo "测试程序启动..."
          timeout 15s ./star-cloud > logs/test.log 2>&1 &
          test_pid=$!
          sleep 5
          
          # 检查测试进程是否还在运行
          if kill -0 $test_pid 2>/dev/null; then
            echo "程序启动测试成功，停止测试进程"
            kill $test_pid
            sleep 2
          else
            echo "❌ 程序启动测试失败"
            echo "查看测试日志:"
            cat logs/test.log || echo "测试日志文件不存在"
            echo "检查是否有其他错误..."
            exit 1
          fi
          
          # 正式启动服务
          echo "正式启动服务..."
          nohup ./star-cloud > logs/app.log 2>&1 &
          echo $! > pid.txt
          
          echo "等待服务启动..."
          sleep 20
          
          # 检查进程是否运行
          if ! pgrep -f "star-cloud" > /dev/null; then
            echo "❌ 服务启动失败"
            echo "查看服务日志:"
            tail -100 logs/app.log || echo "日志文件不存在"
            echo "查看进程状态:"
            ps aux | grep star-cloud || echo "没有找到相关进程"
            echo "检查端口占用:"
            netstat -tlnp | grep 8080 || echo "8080端口未被占用"
            exit 1
          fi
          
          echo "服务已启动，检查健康状态..."
          
          # 检查服务状态
          for i in {1..5}; do
            echo "第 $i 次健康检查..."
            if curl -f http://localhost:8080/health > /dev/null 2>&1; then
              echo "✅ 部署成功！服务正常运行"
              exit 0
            else
              echo "健康检查失败，等待重试..."
              sleep 5
            fi
          done
          
          echo "❌ 部署失败，服务无法正常响应"
          echo "查看服务日志:"
          tail -100 logs/app.log || echo "日志文件不存在"
          echo "查看进程状态:"
          ps aux | grep star-cloud || echo "没有找到相关进程"
          echo "检查端口占用:"
          netstat -tlnp | grep 8080 || echo "8080端口未被占用"
          
          # 回滚到备份版本
          echo "尝试回滚到备份版本..."
          if [ -f star-cloud.backup.* ]; then
            latest_backup=$(ls -t star-cloud.backup.* | head -1)
            echo "使用备份文件: $latest_backup"
            mv "$latest_backup" star-cloud
            chmod +x star-cloud
            nohup ./star-cloud > logs/app.log 2>&1 &
            echo $! > pid.txt
            sleep 15
            if curl -f http://localhost:8080/health > /dev/null 2>&1; then
              echo "✅ 回滚成功，服务已恢复"
            else
              echo "❌ 回滚也失败了"
            fi
          else
            echo "没有找到备份文件"
          fi 