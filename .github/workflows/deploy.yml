name: 自动部署到云端

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置Go环境
      uses: actions/setup-go@v4
      with:
        go-version: '1.23.4'
        
    - name: 构建Go程序
      run: |
        cd backend
        go mod download
        go build -o main main.go
        
    - name: 部署到服务器
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: ${{ secrets.PORT }}
        script: |
          # 进入项目目录
          cd /www/wwwroot/axi-star-cloud
          
          # 备份当前版本
          echo "📦 备份当前版本..."
          if [ -f backend/main ]; then
            cp backend/main backend/main.backup.$(date +%Y%m%d_%H%M%S)
          fi
          
          # 拉取最新代码
          echo "🔄 拉取最新代码..."
          git pull origin main
          
          # 运行权限修复脚本
          echo "🔧 修复权限..."
          chmod +x fix-permissions.sh
          ./fix-permissions.sh
          
          # 复制新构建的程序
          echo "📋 更新程序文件..."
          cp backend/main backend/main.new
          chmod +x backend/main.new
          
          # 停止当前服务
          echo "⏹️  停止当前服务..."
          pkill -f "backend/main" || true
          sleep 2
          
          # 替换程序文件
          echo "🔄 替换程序文件..."
          mv backend/main.new backend/main
          
          # 启动新服务
          echo "▶️  启动新服务..."
          cd backend
          nohup ./main > ../logs/app.log 2>&1 &
          echo $! > ../pid.txt
          
          # 等待服务启动
          echo "⏳ 等待服务启动..."
          sleep 5
          
          # 检查服务状态
          echo "🔍 检查服务状态..."
          if curl -f http://localhost:8080/health > /dev/null 2>&1; then
            echo "✅ 部署成功！服务已启动"
          else
            echo "❌ 部署失败，回滚到备份版本"
            if [ -f backend/main.backup.* ]; then
              latest_backup=$(ls -t backend/main.backup.* | head -1)
              mv "$latest_backup" backend/main
              cd backend
              nohup ./main > ../logs/app.log 2>&1 &
              echo $! > ../pid.txt
            fi
          fi
          
          echo "🎉 部署完成！" 