name: 自动部署到云端

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置Go环境
      uses: actions/setup-go@v4
      with:
        go-version: '1.23.4'
        
    - name: 构建Go程序
      run: |
        cd backend
        go mod download
        go mod tidy
        go build -o star-cloud main.go
        
    - name: 部署到服务器
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_KEY }}
        port: 22
        script: |
          cd /www/wwwroot/axi-star-cloud
          
          # 备份当前版本
          if [ -f star-cloud ]; then
            cp star-cloud star-cloud.backup.$(date +%Y%m%d_%H%M%S)
          fi
          
          # 拉取最新代码
          git pull origin main
          
          # 重新编译程序
          cd backend
          go mod download
          go mod tidy
          go build -o ../star-cloud main.go
          cd ..
          chmod +x star-cloud
          
          # 停止当前服务
          pkill -f "star-cloud" || true
          sleep 2
          
          # 启动新服务
          nohup ./star-cloud > logs/app.log 2>&1 &
          echo $! > pid.txt
          
          # 等待服务启动
          sleep 5
          
          # 检查服务状态
          if curl -f http://localhost:8080/health > /dev/null 2>&1; then
            echo "✅ 部署成功！"
          else
            echo "❌ 部署失败，回滚到备份版本"
            if [ -f star-cloud.backup.* ]; then
              latest_backup=$(ls -t star-cloud.backup.* | head -1)
              mv "$latest_backup" star-cloud
              nohup ./star-cloud > logs/app.log 2>&1 &
              echo $! > pid.txt
            fi
          fi 