name: 自动部署到云端

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置Go环境
      uses: actions/setup-go@v4
      with:
        go-version: '1.23.4'
        
    - name: 编译并打包
      run: |
        cd backend
        go mod tidy
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o star-cloud-linux main.go
        tar czf ../star-cloud-linux.tar.gz star-cloud-linux
        
    - name: 启动ssh-agent
      uses: webfactory/ssh-agent@v0.5.4
      with:
        ssh-private-key: ${{ secrets.SERVER_KEY }}
        
    - name: 创建远程目录
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
          "mkdir -p /www/wwwroot/axi-star-cloud/logs /www/wwwroot/axi-star-cloud/uploads"
          
    - name: 上传文件
      run: |
        scp -o StrictHostKeyChecking=no star-cloud-linux.tar.gz \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/www/wwwroot/axi-star-cloud/
            
    - name: 部署并重启服务
      run: |
        # 把私钥写到文件
        mkdir -p ~/.ssh
        echo "${{ secrets.SERVER_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        
        # SSH到服务器执行部署命令
        ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
          set -e
          
          echo "=== 开始部署流程 ==="
          date
          
          # 进入项目目录
          cd /www/wwwroot/axi-star-cloud
          pwd
          ls -la
          
          # 停止当前服务
          echo "停止当前服务..."
          pkill -f "star-cloud" || echo "没有找到运行中的服务"
          sleep 3
          
          # 解包并替换二进制
          echo "解包并替换二进制..."
          tar xzf star-cloud-linux.tar.gz
          chmod +x star-cloud-linux
          
          # 创建必要的目录
          echo "创建必要的目录..."
          mkdir -p logs uploads
          mkdir -p uploads/{image,document,audio,video,other,avatars}
          
          # 启动新服务
          echo "启动新服务..."
          nohup ./star-cloud-linux > logs/app.log 2>&1 &
          echo $! > pid.txt
          echo "服务PID: $!"
          
          # 等待服务启动
          echo "等待服务启动..."
          sleep 10
          
          # 检查服务状态
          echo "检查服务状态..."
          if pgrep -f "star-cloud" > /dev/null; then
            echo "✅ 服务已启动"
            
            # 健康检查
            for i in {1..3}; do
              echo "第 $i 次健康检查..."
              if curl -f -s http://localhost:8080/health > /dev/null 2>&1; then
                echo "✅ 部署成功！服务正常运行"
                echo "服务日志:"
                tail -10 logs/app.log
                exit 0
              else
                echo "健康检查失败，等待重试..."
                sleep 5
              fi
            done
            
            echo "❌ 健康检查失败"
            echo "查看服务日志:"
            tail -20 logs/app.log || echo "日志文件不存在"
          else
            echo "❌ 服务启动失败"
            echo "查看服务日志:"
            tail -50 logs/app.log || echo "日志文件不存在"
            exit 1
          fi
        EOF 