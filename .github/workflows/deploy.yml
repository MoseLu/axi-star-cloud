name: 自动部署到云端

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置Go环境
      uses: actions/setup-go@v4
      with:
        go-version: '1.23.4'
        
    - name: 构建Go程序
      run: |
        cd backend
        go mod download
        go mod tidy
        go build -o star-cloud main.go
        
    - name: 部署到服务器
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_KEY }}
        port: 22
        script: |
          cd /www/wwwroot/axi-star-cloud
          
          echo "=== 开始部署流程 ==="
          
          # 备份当前版本
          if [ -f star-cloud ]; then
            echo "备份当前版本..."
            cp star-cloud star-cloud.backup.$(date +%Y%m%d_%H%M%S)
          fi
          
          # 设置Go环境
          export PATH=$PATH:/usr/local/btgo/bin
          
          # 验证Go环境
          echo "验证Go环境..."
          /usr/local/btgo/bin/go version
          
          # 重新编译程序
          echo "开始编译程序..."
          cd backend
          /usr/local/btgo/bin/go mod download
          /usr/local/btgo/bin/go mod tidy
          /usr/local/btgo/bin/go build -o ../star-cloud main.go
          cd ..
          
          # 设置执行权限
          chmod +x star-cloud
          
          # 停止当前服务
          echo "停止当前服务..."
          pkill -f "star-cloud" || true
          sleep 5
          
          # 启动新服务
          echo "启动新服务..."
          mkdir -p logs
          nohup ./star-cloud > logs/app.log 2>&1 &
          echo $! > pid.txt
          
          # 等待服务启动
          echo "等待服务启动..."
          sleep 10
          
          # 检查服务状态
          echo "检查服务状态..."
          if pgrep -f "star-cloud" > /dev/null; then
            echo "✅ 服务已启动"
            
            # 健康检查
            for i in {1..3}; do
              echo "第 $i 次健康检查..."
              if curl -f http://localhost:8080/health > /dev/null 2>&1; then
                echo "✅ 部署成功！服务正常运行"
                exit 0
              else
                echo "健康检查失败，等待重试..."
                sleep 5
              fi
            done
            
            echo "❌ 健康检查失败，但服务正在运行"
            echo "查看服务日志:"
            tail -20 logs/app.log || echo "日志文件不存在"
          else
            echo "❌ 服务启动失败"
            echo "查看服务日志:"
            tail -50 logs/app.log || echo "日志文件不存在"
            
            # 尝试回滚
            if [ -f star-cloud.backup.* ]; then
              echo "尝试回滚..."
              latest_backup=$(ls -t star-cloud.backup.* | head -1)
              mv "$latest_backup" star-cloud
              chmod +x star-cloud
              nohup ./star-cloud > logs/app.log 2>&1 &
              echo $! > pid.txt
              sleep 10
              if pgrep -f "star-cloud" > /dev/null; then
                echo "✅ 回滚成功"
              else
                echo "❌ 回滚失败"
              fi
            fi
          fi 